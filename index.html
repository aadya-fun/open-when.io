<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open When... 📬</title>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

:root {
  --bg: #f7f4ee;
  --card-bg: #ffffff;
  --ink: #1a1a1a;
  --ink-mid: #555;
  --ink-light: #999;
  --accent1: #ff6b35;
  --accent2: #3b82f6;
  --accent3: #10b981;
  --accent4: #f59e0b;
  --accent5: #ec4899;
  --accent6: #8b5cf6;
  --accent7: #ef4444;
  --border: #e5e0d5;
}

body {
  font-family: 'Figtree', sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
}

/* HEADER */
header {
  padding: 3.5rem 2rem 1rem;
  max-width: 1000px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}

.header-tag {
  font-family: 'Instrument Sans', sans-serif;
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-mid);
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.header-tag::before {
  content: '';
  display: block;
  width: 28px;
  height: 2px;
  background: var(--ink);
}

h1 {
  font-family: 'Instrument Sans', sans-serif;
  font-size: clamp(2rem, 4.5vw, 3.2rem);
  font-weight: 700;
  line-height: 1.1;
  letter-spacing: -0.01em;
  color: var(--ink);
}

h1 span {
  display: inline-block;
  background: var(--ink);
  color: var(--bg);
  padding: 0 0.18em;
  border-radius: 4px;
}

.header-sub {
  font-size: 1rem;
  color: var(--ink-mid);
  font-weight: 300;
  margin-top: 0.3rem;
  max-width: 420px;
  line-height: 1.6;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
  gap: 1.2rem;
  max-width: 1000px;
  margin: 2.5rem auto 4rem;
  padding: 0 2rem;
}

/* CARD */
.card {
  background: var(--card-bg);
  border: 1.5px solid var(--border);
  border-radius: 16px;
  cursor: pointer;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  overflow: hidden;
  position: relative;
}

.card:hover {
  transform: translateY(-5px) rotate(-0.5deg);
  box-shadow: 0 16px 40px rgba(0,0,0,0.1);
}

.card-top {
  height: 90px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 1.4rem;
  position: relative;
}

.card-emoji {
  font-size: 2.6rem;
  line-height: 1;
}

.card-num {
  font-family: 'Instrument Sans', sans-serif;
  font-size: 3.5rem;
  font-weight: 800;
  color: rgba(255,255,255,0.25);
  line-height: 1;
  user-select: none;
}

.card-body {
  padding: 1rem 1.4rem 1.4rem;
}

.card-label {
  font-size: 0.68rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 0.3rem;
}

.card-title {
  font-family: 'Instrument Sans', sans-serif;
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 0.5rem;
  line-height: 1.3;
}

.card-hint {
  font-size: 0.82rem;
  color: var(--ink-mid);
  font-weight: 400;
  line-height: 1.55;
  margin-bottom: 1rem;
}

.card-footer {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-size: 0.78rem;
  font-weight: 500;
  color: var(--ink-light);
}

.lock-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--ink-light);
}

/* MODAL */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(20,20,20,0.7);
  backdrop-filter: blur(6px);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 1.5rem;
}

.overlay.open { display: flex; }

.modal {
  background: #fff;
  border-radius: 20px;
  width: 100%;
  max-width: 480px;
  max-height: 90vh;
  overflow-y: auto;
  position: relative;
  animation: popIn 0.28s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow: 0 30px 80px rgba(0,0,0,0.2);
}

@keyframes popIn {
  from { opacity:0; transform: scale(0.88) translateY(20px); }
  to { opacity:1; transform: none; }
}

.modal-close {
  position: absolute;
  top: 1rem;
  right: 1rem;
  background: #f0ede8;
  border: none;
  width: 34px;
  height: 34px;
  border-radius: 50%;
  font-size: 1rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
  color: var(--ink);
  transition: background 0.15s;
}
.modal-close:hover { background: #e0ddd8; }

/* PASSWORD SCREEN */
.pw-screen {
  padding: 2.5rem 2rem 2.5rem;
  text-align: center;
}

.pw-top {
  height: 6px;
  border-radius: 20px 20px 0 0;
  margin: -2.5rem -2rem 2rem;
}

.pw-emoji {
  font-size: 3rem;
  margin-bottom: 0.8rem;
  display: block;
}

.pw-label {
  font-size: 0.7rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--ink-light);
  margin-bottom: 0.3rem;
  font-weight: 500;
}

.pw-title {
  font-family: 'Instrument Sans', sans-serif;
  font-size: 1.6rem;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 1.8rem;
}

.pw-input {
  width: 100%;
  padding: 0.85rem 1rem;
  border: 2px solid #e5e0d5;
  border-radius: 12px;
  font-family: 'Figtree', sans-serif;
  font-size: 1rem;
  font-weight: 400;
  letter-spacing: 0.15em;
  text-align: center;
  color: var(--ink);
  background: var(--bg);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  margin-bottom: 0.6rem;
}

.pw-input:focus { border-color: var(--ink); box-shadow: 0 0 0 3px rgba(0,0,0,0.06); }
.pw-input.wrong { border-color: #ef4444; animation: shake 0.3s ease; }

@keyframes shake {
  0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}
}

.pw-error {
  font-size: 0.8rem;
  color: #ef4444;
  min-height: 1.1rem;
  margin-bottom: 0.5rem;
  font-weight: 500;
}

.pw-btn {
  width: 100%;
  padding: 0.9rem;
  background: var(--ink);
  color: #fff;
  border: none;
  border-radius: 12px;
  font-family: 'Instrument Sans', sans-serif;
  font-size: 0.85rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
}
.pw-btn:hover { background: #333; }
.pw-btn:active { transform: scale(0.98); }

.pw-hint {
  margin-top: 1.1rem;
  font-size: 0.8rem;
  color: var(--ink-light);
  font-weight: 300;
}

/* LETTER SCREEN */
.letter-screen { display: none; }
.letter-screen.show { display: block; }

.letter-photo {
  width: 100%;
  height: 260px;
  object-fit: cover;
  display: block;
  border-radius: 20px 20px 0 0;
}

.photo-placeholder {
  width: 100%;
  height: 200px;
  background: #f0ede8;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0.4rem;
  color: var(--ink-light);
  font-size: 0.82rem;
  border-radius: 20px 20px 0 0;
}

.photo-placeholder span:first-child { font-size: 2.5rem; }

.letter-body {
  padding: 1.8rem 2rem 2.2rem;
}

.letter-opener {
  font-family: 'Instrument Sans', sans-serif;
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--ink-light);
  margin-bottom: 1.2rem;
}

.letter-note {
  font-size: 0.97rem;
  line-height: 1.85;
  color: var(--ink);
  white-space: pre-line;
  font-weight: 300;
}

.letter-sign {
  margin-top: 1.5rem;
  font-family: 'Instrument Sans', sans-serif;
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--ink);
}

footer {
  text-align: center;
  padding: 1.5rem;
  font-size: 0.75rem;
  color: var(--ink-light);
  font-weight: 300;
}
</style>
</head>
<body>

<header>
  <div class="header-tag">just for you</div>
  <h1>Open When<br>You <span>Need This</span></h1>
  <p class="header-sub">Seven sealed notes. Only open the right one at the right time — no cheating! 😤</p>
</header>

<div class="grid" id="grid"></div>

<footer>made by your best friend — with zero chill and a lot of love 💛</footer>

<div class="overlay" id="overlay">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>

    <div class="pw-screen" id="pwScreen">
      <div class="pw-top" id="pwTopBar"></div>
      <span class="pw-emoji" id="pwEmoji"></span>
      <div class="pw-label" id="pwLabel"></div>
      <div class="pw-title" id="pwTitle"></div>
      <input class="pw-input" id="pwInput" type="password" placeholder="type the password..." autocomplete="off"
        onkeydown="if(event.key==='Enter')tryUnlock()" oninput="clearErr()">
      <div class="pw-error" id="pwError"></div>
      <button class="pw-btn" onclick="tryUnlock()">🔓 Open this letter</button>

    </div>

    <div class="letter-screen" id="letterScreen">
      <div id="photoSlot"></div>
      <div class="letter-body">
        <div class="letter-opener" id="letterOpener"></div>
        <div class="letter-note" id="letterNote"></div>
        <div class="letter-sign" id="letterSign"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ============================================================
// ✏️  YOUR LETTERS — edit everything in here!
// password is case-insensitive
// photo: set to a path like "sad.jpeg" or leave "" for placeholder
// ============================================================
const letters = [
  {
    color: "#6366f1",
    emoji: "🥺",
    label: "Open when...",
    title: "You're feeling sad",
    hint: "",
    password: "never",
    photo: "sad.jpeg",
    note: "kyu sad h? kya hua? do you wanna talk about it? Ring me if you want to talk about it baby. If not thodu saa me time karle phir call me. I promise I'll pick up at any time in any time zone.\n\nThore se aasu baha kar skin care toh tu kar hi leti hai. If you want to, but I don't want you to but still sometimes it makes you feel lighter :)",
    sign: "Love you and I am always there ❤️"
  },
  {
    color: "#f59e0b",
    emoji: "🎉",
    label: "Open when...",
    title: "You're happy!",
    hint: "",
    password: "010604",
    photo: "happy.jpeg",
    note: "Khush Hooke Meri yaad aayi? Yaa Maine hi bola ye kholne? Anyways, yayyyyy, I am so so so so so happy for you and proud of you alwayssss! I would have hugged you if we were still neighbours 😭\n\nBut yesss 🫂X♾️ for now. Call kar fatafat we need to celebrate asap baby.",
    sign: "Love you keep killing and acing bitch ;)"
  },
  {
    color: "#ef4444",
    emoji: "💢",
    label: "Open when...",
    title: "We fought",
    hint: "",
    password: "aadyachutiyahai",
    photo: "fought.jpeg",
    note: "I hope tujhe ye kholne ki zarurat kabhi bhi naa pade. I mean it.\n\nIf we fought let's just get over with it. Maine koi chutiya sa bakwaas kar rahi hu toh pls curse me and tell me my older self is cursing her too.\n\nCALL ASAP",
    sign: "— your idiot, always 💔"
  },
  {
    color: "#ec4899",
    emoji: "🫶",
    label: "Open when...",
    title: "You miss me",
    hint: "",
    password: "missingyoutoo",
    photo: "missme.jpeg",
    note: "kya hua darling? Call karlo naa Mujhe agar miss kar rahe hoo. Do not think about the time or how busy I might be.\n\nNever ever busy for you 😘",
    sign: "— always yours 💕"
  },
  {
    color: "#10b981",
    emoji: "🥱",
    label: "Open when...",
    title: "You're bored",
    hint: "",
    password: "gossip",
    photo: "bored.jpeg",
    note: "Bore ho raha hai? 😭 Kya karu mai entertain karne ke liye meri jaan ko? Go eat something first because half the time tera boredom bhook hota hai.\n\nThen either call me yaa random reels bhej mujhe till we both start laughing for no reason.\n\nAur agar social battery khatam hai then blanket ke andar ghus jaa, put on some comfort show and pretend I'm there annoying you continuously.",
    sign: "Love youuuuu, now stop being boring and text me back 😡❤️"
  },
  {
    color: "#8b5cf6",
    emoji: "🫂",
    label: "Open when...",
    title: "You need a hug",
    hint: "",
    password: "soojao",
    photo: "hug.jpeg",
    note: "Aaja idhar 🫂 I know sometimes words bilkul kaam nahi karte and you just need someone to hold you tightly and tell you everything will be okay. So consider this a longgg tight hug from me okay?\n\nClose your eyes for 2 minutes and imagine we're sitting together and I'm listening seriously while you rant about everything. You don't always have to act strong baby.\n\nDrink some water, take deep breaths and call me if you want. I'll sit with you even if you don't wanna talk at all ❤️",
    sign: "— your hug is waiting 🫂"
  },
  {
    color: "#ff6b35",
    emoji: "😤",
    label: "Open when...",
    title: "You're irritated",
    hint: "",
    password: "metimechahiye",
    photo: "irritated.jpeg",
    note: "Okayyyy who pissed you off now? 😭 Pehle toh breathe because I know tu gusse mei aur zyada cute lagti hai but also thodi scary.\n\nRant karna hai? Character assassination karni hai? Judge nahi karungi promise 😭 Call me and let it all out before you start overthinking and replaying everything in your head 400 times.\n\nAlso don't let one annoying person or one bad moment ruin your whole day okay? You're too pretty for stress lines 😡❤️",
    sign: "Love you alwayssss 💛"
  }
];

// ============================================================
// Logic
// ============================================================
let active = null;

function buildGrid() {
  const grid = document.getElementById('grid');
  letters.forEach((l, i) => {
    const c = document.createElement('div');
    c.className = 'card';
    c.onclick = () => openModal(i);
    c.innerHTML = `
      <div class="card-top" style="background:${l.color}">
        <span class="card-emoji">${l.emoji}</span>
        <span class="card-num">0${i+1}</span>
      </div>
      <div class="card-body">
        <div class="card-label" style="color:${l.color}">${l.label}</div>
        <div class="card-title">${l.title}</div>

        <div class="card-footer">
          <div class="lock-dot"></div>
          password locked
        </div>
      </div>`;
    grid.appendChild(c);
  });
}

function openModal(i) {
  active = i;
  const l = letters[i];
  document.getElementById('pwInput').value = '';
  document.getElementById('pwInput').classList.remove('wrong');
  document.getElementById('pwError').textContent = '';
  document.getElementById('pwTopBar').style.background = l.color;
  document.getElementById('pwEmoji').textContent = l.emoji;
  document.getElementById('pwLabel').textContent = l.label;
  document.getElementById('pwTitle').textContent = l.title;

  document.getElementById('pwScreen').style.display = 'block';
  document.getElementById('letterScreen').classList.remove('show');
  document.getElementById('overlay').classList.add('open');
  setTimeout(() => document.getElementById('pwInput').focus(), 300);
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  active = null;
}

function clearErr() {
  document.getElementById('pwError').textContent = '';
  document.getElementById('pwInput').classList.remove('wrong');
}

function tryUnlock() {
  const val = document.getElementById('pwInput').value.trim().toLowerCase();
  const l = letters[active];
  if (val === l.password.toLowerCase()) {
    showLetter(l);
  } else {
    const inp = document.getElementById('pwInput');
    inp.classList.add('wrong');
    document.getElementById('pwError').textContent = 'Wrong password — think harder 🙃';
    setTimeout(() => inp.classList.remove('wrong'), 400);
    inp.value = '';
    inp.focus();
  }
}

function showLetter(l) {
  document.getElementById('pwScreen').style.display = 'none';
  const slot = document.getElementById('photoSlot');
  slot.innerHTML = l.photo
    ? `<img class="letter-photo" src="${l.photo}" alt="photo">`
    : `<div class="photo-placeholder" style="background:${l.color}22">
        <span>📷</span>
        <span style="color:#888">add your photo here</span>
       </div>`;
  document.getElementById('letterOpener').textContent = `${l.label} ${l.title}`;
  document.getElementById('letterNote').textContent = l.note;
  document.getElementById('letterSign').textContent = l.sign;
  document.getElementById('letterScreen').classList.add('show');
  document.getElementById('modal').scrollTop = 0;
}

document.getElementById('overlay').addEventListener('click', e => { if (e.target.id === 'overlay') closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

buildGrid();
</script>
</body>
</html>
